            :\"客户信息尚不完整，建议继续挖掘需求后再进行报价。\",\"dms_payload\":{\"customer_id\":\"\",\"\
            session_id\":\"\",\"summary\":\"信息不足\",\"intent_tags\":[],\"purchase_probability\"\
            :0,\"followup_time\":\"\"},\"sync_status\":\"skipped\"}\n\n**禁止在信息不足时进行任何推理、补充或编造。**\n\
            \n---\n\n## 正常处理规则（仅当信息完整时执行）\n\n### 输入说明\n- full_profile：客户画像 JSON（intent,\
