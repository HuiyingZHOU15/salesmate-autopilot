          , \"\")\n    comparison_card = data.get(\"comparison_card\", \"\")\n   \
          \ \n    # 如果字段仍然为空，尝试从嵌套的 result 或 profile_json 中提取\n    if not recommendation_text:\n\
          \        for key in [\"result\", \"profile_json\", \"output\"]:\n      \
          \      if key in data and isinstance(data[key], dict):\n               \
          \ recommendation_text = data[key].get(\"recommendation_text\", \"\")\n \
          \               recommended_model = data[key].get(\"recommended_model\"\
          , \"\")\n                alternative_model = data[key].get(\"alternative_model\"\
          , \"\")\n                comparison_card = data[key].get(\"comparison_card\"\
          , \"\")\n                if recommendation_text:\n                    break\n\
          \    \n    # 确保类型正确\n    recommendation_text = str(recommendation_text)\
          \ if recommendation_text else \"\"\n    recommended_model = str(recommended_model)\
