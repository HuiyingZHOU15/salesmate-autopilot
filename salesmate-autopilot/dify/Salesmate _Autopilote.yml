          \"\n    alternative_model = \"\"\n    comparison_card = \"\"\n    \n   \
          \ # 优先从 json_array 解析\n    data = None\n    if json_array:\n        try:\n\
          \            parsed = json.loads(json_array)\n            if isinstance(parsed,\
          \ list) and len(parsed) > 0:\n                data = parsed[0]  # 取数组第一个对象\n\
          \            elif isinstance(parsed, dict):\n                data = parsed\n\
          \        except:\n            pass\n    \n    # 如果 json_array 解析失败或为空，尝试从\
          \ text_output 中提取 JSON\n    if not data and text_output:\n        try:\n\
          \            # 尝试直接解析\n            data = json.loads(text_output)\n    \
          \    except:\n            # 尝试提取 JSON 片段\n            import re\n      \
          \      match = re.search(r'\\{.*\\}', text_output, re.DOTALL)\n        \
          \    if match:\n                try:\n                    data = json.loads(match.group())\n\
          \                except:\n                    pass\n    \n    # 如果 data\
          \ 仍然是字符串，再解析一次\n    if isinstance(data, str):\n        try:\n          \
          \  data = json.loads(data)\n        except:\n            data = {}\n   \
          \ \n    if not data:\n        data = {}\n    \n    # 提取字段\n    recommendation_text\
